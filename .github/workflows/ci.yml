name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  DATABASE_URL: "postgresql://crm:crm@localhost:5432/crm"
  NEXTAUTH_SECRET: "dummy-ci-secret-not-real"
  NEXTAUTH_URL: "http://localhost:3000"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Bundle size ratchet
        run: npm run check:bundle-size:existing
