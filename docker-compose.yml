services:
  traefik:
    image: traefik:v3.2
    profiles:
      - proxy
    restart: unless-stopped
    command:
      # Docker provider — only expose services that opt-in via labels
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Auto-redirect HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt via HTTP-01 challenge
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.invalid}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik_acme:/letsencrypt"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional sidecar. The app degrades gracefully when REDIS_URL is unset, but
  # rate limiting and KPI caching are far more useful with Redis running.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: deps
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    command:
      [
        "sh",
        "-c",
        "node node_modules/prisma/build/index.js db execute --file prisma/migrations/20260518000000_release_compat/migration.sql; node node_modules/prisma/build/index.js db push --accept-data-loss",
      ]
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    # No host port binding — Traefik proxies traffic internally
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-${NEXTAUTH_URL}}
      NODE_ENV: ${NODE_ENV}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_API_KEY: ${TWILIO_API_KEY:-}
      TWILIO_API_SECRET: ${TWILIO_API_SECRET:-}
      TWILIO_TWIML_APP_SID: ${TWILIO_TWIML_APP_SID:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      DIALER_ENABLED: ${DIALER_ENABLED:-false}
      SCRAPER_ENABLED: ${SCRAPER_ENABLED:-true}
      SCRAPER_PYTHON_PATH: /opt/venv/bin/python3
      SCRAPER_SCRIPT_PATH: /app/scraper/scraper.py
      SCRAPER_OUTPUT_BASE_DIR: /app/scraper-output
      TRUSTED_PROXY: "true"
    volumes:
      - scraper_output:/app/scraper-output
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

volumes:
  postgres_data_v2:
  scraper_output:
  redis_data:
  traefik_acme:
